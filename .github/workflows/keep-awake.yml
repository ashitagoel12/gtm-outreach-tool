name: Keep Awake

on:
  # Ping every 6 hours to prevent Streamlit Community Cloud from sleeping
  schedule:
    - cron: '0 */6 * * *'
  # Allow a one-click manual run from the Actions tab at any time
  workflow_dispatch:

# Needed so the timestamp job can push a commit back to the repo
permissions:
  contents: write

jobs:
  keep-awake:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Ping the Streamlit app ─────────────────────────────────────────
      # Streamlit Community Cloud redirects through several hops before
      # landing, so -f (fail-on-4xx/5xx) combined with -L triggers curl
      # exit 47 (too many redirects). Instead we capture the final HTTP
      # status code and fail explicitly only on 5xx or a connection error
      # (status 000). 2xx/3xx/4xx all mean the app is reachable.
      - name: Ping Streamlit app
        run: |
          echo "Pinging https://gtm-outreach-tool.streamlit.app/ ..."
          STATUS=$(curl -sSL --max-time 60 --max-redirs 15 \
            -o /dev/null -w "%{http_code}" \
            https://gtm-outreach-tool.streamlit.app/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "000" ] || [ "$STATUS" -ge 500 ]; then
            echo "❌ Ping failed (status $STATUS)"
            exit 1
          fi
          echo "✅ App is alive (status $STATUS)"

      # ── 2. Touch a timestamp file (scheduled runs only) ───────────────────
      # GitHub auto-disables scheduled workflows after 60 days of repo
      # inactivity. Committing this file back counts as repo activity and
      # keeps the workflow enabled indefinitely.
      # Skipped entirely on manual (workflow_dispatch) runs.
      - name: Check out repo
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4

      - name: Commit keep-awake timestamp
        if: github.event_name == 'schedule'
        run: |
          echo "Last scheduled ping: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/last-run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last-run.txt
          # Only push if the file actually changed (idempotent)
          git diff --staged --quiet || git commit -m "chore: keep-awake ping [skip ci]"
          git push
